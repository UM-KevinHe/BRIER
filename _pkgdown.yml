url: https://um-kevinhe.github.io/BRIER/
llm-docs: false
template:
  bootstrap: 5
  bslib:
    base_font:
      google: Roboto
    heading_font:
      google: Roboto Slab
    code_font:
      google: JetBrains Mono
    bootswatch: lumen
  math-rendering: mathjax
toc:
  depth: 6
navbar:
  left:
  - text: Home
    href: index.html
  - text: Get started
    href: articles/BRIER.html
  - text: Appendix
    menu:
    - text: Integration of Multiple External Models
      href: articles/Appendix_Multiple.html
    - text: Selection of Integration Weight using Bayesian Optimization
      href: articles/Appendix_BayesianOptimization.html
    - text: Data Preprocessing When Modeling with Genotypes
      href: articles/Appendix_Preprocess.html
    - text: Model Details
      href: articles/Appendix_Model.html
    - text: Distribution Family and Evaluation Metrics
      href: articles/Appendix_Distr.html
    - text: Information Criteria for Hyper-parameter Tuning
      href: articles/Appendix_IC.html
    - text: Recovering Summary-level Input from GWAS Results
      href: articles/Appendix_GWAS.html
  - text: Reference
    href: reference/index.html
  right:
  - icon: fa-github fa-lg
    href: https://github.com/um-kevinhe/BRIER
    aria-label: GitHub repository
articles:
- title: Get started
  navbar: ~
  contents: BRIER
- title: Appendix
  navbar: Appendix
  contents:
  - Appendix_Multiple
  - Appendix_BayesianOptimization
  - Appendix_Preprocess
  - Appendix_Model
  - Appendix_Distr
  - Appendix_IC
  - Appendix_GWAS
reference: 
- title: "BRIER.FULL"
  desc: >
    Models that integrate individual level external data to individual-level target data.
  contents:
    - BRIERfull
    - BRIERfull.selection
- title: "BRIER.I"
  desc: >
    Models that integrate pretrained external models with individual-level target data.
  contents:
    - BRIERi    
    - BRIERi.cv
    - BRIERi.selection
- title: "BRIER.S"
  desc: >
    Models that integrate summary-level external data to summary-level target data
  contents:
    - BRIERs    
    - BRIERs.selection
- title: "Predictions"
  desc: >
    Make predictions of a fitted BRIER object on an independent testing set
  contents:
    - predict.BRIER  
    - predict.BRIER.eta
    - coef.BRIER
    - coef.BRIER.eta
- title: "Data processing"
  desc: >
    Data processing of input data
  contents:
    - preprocessI
    - preprocessS
    - mergeExternals
    - p2cor
    - calLD
    - standardize_X
- title: "Plotting"
  desc: >
    Plotting functions for visualizing the results of BRIER.
  contents:
    - plot.eta
    - plot.box
    - plot.importance
- title: "Other utilities"
  desc: >
    Additional helper functions.
  contents:
    - g_link
    - ginv_link
    - calcDev
    - calcNullDev
    - evalMetric
    - pseudo_validation
    - calcExtY
    - calcExtXtY
- title: "Datasets"
  desc: >
    Example datasets.
  contents:
    - Data_BRIERfull
    - Data_BRIERi
    - Data_BRIERs
    - Data_preprocessI
    - Data_preprocessS
- title: "Internals"
  desc: >
    Internal helpers, not intended for end users.
  contents:
    - LD_blocks
    - LD_sigma
    - cd_glm_fit_ssr
    - cd_summary_fit
    - cd_wgaussian_fit_ssr
    - cd_wglm_fit_ssr
    - maxlambda_summary
    - maxprod
    - unstand_beta
    - wstandardize_X
